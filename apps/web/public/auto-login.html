<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.json" />
  <title>Coach Keith AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Inter, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
    }
    .container { text-align: center; }
    h2 { font-size: 1.25rem; margin-bottom: 1rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e293b;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    .error { color: #f43f5e; font-size: 0.875rem; margin-top: 1rem; display: none; }
    .error a { color: #f59e0b; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h2>Setting up your session...</h2>
    <p class="error" id="error">Could not create session. <a href="/register">Register here</a></p>
  </div>
  <script>
    (async function() {
      try {
        const apiBase = 'http://localhost:3001/api/v1';
        const res = await fetch(apiBase + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: 'demo_' + Date.now() + '@coachkeith.app',
            password: 'DemoPass1',
            firstName: 'Demo',
            lastName: 'User'
          })
        });
        const data = await res.json();
        if (data.accessToken) {
          localStorage.setItem('auth_token', data.accessToken);
          window.location.href = '/dashboard';
        } else {
          document.getElementById('error').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('error').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
